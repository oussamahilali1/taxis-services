<!DOCTYPE html>
<html lang="fr-BE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Taxi Anderlues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/login.css">

</head>
<body>

  <div class="login-container">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">TA</div>
      <span class="nav-logo-text">TAXI <span>ADMIN</span></span>
    </a>
    <h2>Espace Sécurisé</h2>
    <p class="subtext">Veuillez vous connecter pour accéder au tableau de bord.</p>

    <form action="index.html" method="GET">
      <div class="form-group">
        <label>Email Administrateur</label>
        <input type="email" class="form-control" placeholder="admin@taxi-anderlues.be" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Se Connecter</button>
    </form>
    
    <a href="index.html" class="back-link">← Retour au site web</a>
  </div>

</body>
</html>
